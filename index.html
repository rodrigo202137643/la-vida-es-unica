<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Para Mariel - Blue</title>
  <style>
    * { box-sizing: border-box; }
    body, html { 
      margin: 0; 
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; 
      background-color: #000000; 
      font-family: 'Cinzel', 'Times New Roman', serif;
    }
    
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #030303;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    #overlay h2 {
      color: #ffccd5;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 20px;
      text-align: center;
      padding: 0 20px;
    }

    #btn-comenzar {
      background: transparent;
      border: 1px solid #ff2a5f;
      color: #ffccd5;
      padding: 14px 35px;
      font-size: 1.1rem;
      letter-spacing: 3px;
      border-radius: 30px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(255, 42, 95, 0.6);
      transition: all 0.3s ease;
    }

    #btn-comenzar:hover {
      background-color: #ff2a5f;
      box-shadow: 0 0 30px rgba(255, 42, 95, 1);
    }

    #carta-sorpresa {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease;
      background: radial-gradient(circle, rgba(255,42,95,0.2) 0%, rgba(0,0,0,0.92) 80%);
    }

    .polaroid-grande {
      background: #111;
      padding: 14px 14px 34px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 204, 213, 0.5);
      box-shadow: 0 0 70px rgba(255, 42, 95, 0.8);
      width: 260px;
      max-width: 80vw;
      transform: scale(0.7);
      animation: zoomInFoto 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .polaroid-grande img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 6px;
      display: block;
    }

    @keyframes zoomInFoto {
      to {
        transform: scale(1);
      }
    }

    #info-sorpresa {
      text-align: center;
      width: 90%;
      max-width: 480px;
      opacity: 0;
      animation: revealText 2s ease forwards 1s;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #nombre {
      color: #ffccd5;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 25px rgba(255, 42, 95, 1), 0 0 50px rgba(255, 42, 95, 0.7);
      margin-bottom: 8px;
    }

    .frase-amor {
      color: #ffb3c1;
      font-size: 1rem;
      letter-spacing: 2px;
      font-style: italic;
      line-height: 1.6;
      text-shadow: 0 0 12px rgba(0,0,0,0.9);
      text-align: center;
    }

    @keyframes revealText {
      to { opacity: 1; }
    }
  </style>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="overlay">
    <h2>Toca la pantalla para ver tu sorpresa</h2>
    <button id="btn-comenzar">Abrir</button>
  </div>

  <div id="carta-sorpresa">
    <div class="polaroid-grande">
      <img src="https://i.postimg.cc/Z5y3fZWk/IMG-20260417-WA0068.jpg" alt="Mariel">
    </div>
    <div id="info-sorpresa">
      <div id="nombre">Mariel</div>
      <div class="frase-amor">"Desde enero de 2021, cada segundo a tu lado se ha convertido en mi destino favorito..."</div>
    </div>
  </div>

  <!-- Audio local oculto que se reproduce solo -->
  <audio id="background-audio" loop preload="auto">
    <source src="blue.mp3" type="audio/mpeg">
  </audio>

  <script>
    const overlay = document.getElementById('overlay');
    const cartaSorpresa = document.getElementById('carta-sorpresa');
    const backgroundAudio = document.getElementById('background-audio');

    let animacionIniciada = false;

    overlay.addEventListener('click', () => {
      if (animacionIniciada) return;
      animacionIniciada = true;

      backgroundAudio.volume = 1.0;
      backgroundAudio.play().catch(error => {
        console.log("Error al reproducir audio:", error);
      });

      overlay.style.opacity = 0;
      setTimeout(() => {
        overlay.style.display = 'none';
        cartaSorpresa.style.opacity = 1;
      }, 1000);

      iniciarAnimacionCorazon();
    });

    const scene = new THREE.Scene();
    const isMobile = window.innerWidth < 768;
    const cameraZ = isMobile ? 120 : 85;
    
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = cameraZ;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // --- GENERACIÓN DE CORAZÓN VOLUMÉTRICO EN 3D CON TEXTURA ---
    const particleCount = isMobile ? 1500 : 3500;
    const vertices = [];
    const colors = [];
    const tl = gsap.timeline({ paused: true });

    // Colores base para dar profundidad y textura (Tonos rosados, rojos intensos y blancos de brillo)
    const colorInside = new THREE.Color(0xff5588);
    const colorEdge = new THREE.Color(0xff0044);
    const colorCore = new THREE.Color(0xffffff);

    for (let i = 0; i < particleCount; i++) {
      // Ecuación paramétrica matemática del corazón en 3D
      const t = Math.PI * 2 * Math.random();
      const u = Math.PI * (Math.random() - 0.5);

      // Coordenadas base del corazón
      let x = 16 * Math.pow(Math.sin(t), 3);
      let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
      
      // Añadir volumen y profundidad real en el eje Z distribuyendo las partículas
      let z = (Math.random() - 0.5) * 14 * Math.sin(Math.abs(u));

      // Escalar tamaño general del corazón
      const scale = isMobile ? 2.2 : 2.8;
      x *= scale;
      y *= scale;
      z *= scale;

      const targetX = x;
      const targetY = y;
      const targetZ = z;

      // Posición inicial aleatoria desde donde vuelan las partículas al formarse
      const vector = new THREE.Vector3(
        (Math.random() - 0.5) * 250,
        (Math.random() - 0.5) * 250,
        (Math.random() - 0.5) * 300
      );
      
      vertices.push(vector);

      // Asignar colores con textura (el centro/núcleo más claro, los bordes más intensos)
      const distFromCenter = Math.sqrt(x*x + y*y);
      let mixedColor = colorEdge.clone();
      if (distFromCenter < 15) {
        mixedColor.lerp(colorCore, Math.random() * 0.7);
      } else {
        mixedColor.lerp(colorInside, Math.random() * 0.5);
      }
      colors.push(mixedColor.r, mixedColor.g, mixedColor.b);

      // Animación de dispersión a la forma final con GSAP
      tl.to(vector, {
        x: targetX,
        y: targetY,
        z: targetZ,
        duration: "random(2.0, 4.0)",
        ease: "power3.inOut"
      }, Math.random() * 0.8);
    }

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(vertices.length * 3);
    const colorsAttr = new Float32Array(colors);

    // Actualizar posiciones iniciales
    for (let i = 0; i < vertices.length; i++) {
      positions[i * 3] = vertices[i].x;
      positions[i * 3 + 1] = vertices[i].y;
      positions[i * 3 + 2] = vertices[i].z;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colorsAttr, 3));

    const material = new THREE.PointsMaterial({ 
      size: isMobile ? 2.2 : 1.6,
      vertexColors: true,
      transparent: true, 
      opacity: 0.95,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    
    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    function iniciarAnimacionCorazon() {
      tl.play();
    }

    let mouseX = 0;
    let mouseY = 0;
    let targetRotationX = 0;
    let targetRotationY = 0;

    window.addEventListener('mousemove', (event) => {
      mouseX = (event.clientX - window.innerWidth / 2) * 0.0008;
      mouseY = (event.clientY - window.innerHeight / 2) * 0.0008;
    });

    window.addEventListener('touchmove', (event) => {
      if (event.touches.length > 0) {
        mouseX = (event.touches[0].clientX - window.innerWidth / 2) * 0.001;
        mouseY = (event.touches[0].clientY - window.innerHeight / 2) * 0.001;
      }
    }, { passive: true });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsedTime = clock.getElapsedTime();

      const positionAttribute = geometry.getAttribute('position');
      for (let i = 0; i < vertices.length; i++) {
        positionAttribute.setXYZ(i, vertices[i].x, vertices[i].y, vertices[i].z);
      }
      positionAttribute.needsUpdate = true;

      // Suave rotación tridimensional constante combinada con el movimiento del mouse/tacto
      targetRotationY = mouseX + Math.sin(elapsedTime * 0.4) * 0.2;
      targetRotationX = mouseY + Math.cos(elapsedTime * 0.4) * 0.15;

      particles.rotation.y += (targetRotationY - particles.rotation.y) * 0.05;
      particles.rotation.x += (targetRotationX - particles.rotation.x) * 0.05;
      
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      const mobileCheck = window.innerWidth < 768;
      camera.position.z = mobileCheck ? 120 : 85;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
